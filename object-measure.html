<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Object Measure - 물체 측정기</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  :root {
    --neon: #00ff88;
    --neon-dim: #00ff8844;
    --neon-glow: 0 0 10px #00ff8866, 0 0 30px #00ff8833;
    --red: #ff3366;
    --cyan: #00d4ff;
    --bg: #0a0e14;
    --panel: #0d1117ee;
    --border: #1a2332;
    --text: #c9d1d9;
    --text-dim: #8b949e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    z-index: 20;
    flex-shrink: 0;
  }
  .header h1 {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--neon);
    text-shadow: var(--neon-glow);
    letter-spacing: 2px;
  }
  .status-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .status-badge.loading {
    background: #ff990022;
    color: #ff9900;
    border: 1px solid #ff990055;
  }
  .status-badge.ready {
    background: #00ff8815;
    color: var(--neon);
    border: 1px solid var(--neon-dim);
    animation: pulse-border 2s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { border-color: var(--neon-dim); }
    50% { border-color: var(--neon); box-shadow: var(--neon-glow); }
  }

  /* ── Camera Container ── */
  .camera-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  video, canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  canvas { z-index: 5; }

  /* ── Scan Line Effect ── */
  .scanline {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 6;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      #00ff8805 3px,
      #00ff8805 4px
    );
  }

  /* ── Corner Brackets ── */
  .corner-brackets {
    position: absolute;
    top: 12%; left: 8%; right: 8%; bottom: 18%;
    z-index: 7;
    pointer-events: none;
  }
  .corner-brackets::before,
  .corner-brackets::after,
  .corner-brackets .inner::before,
  .corner-brackets .inner::after {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--neon-dim);
    border-style: solid;
    border-width: 0;
  }
  .corner-brackets::before { top: 0; left: 0; border-top-width: 2px; border-left-width: 2px; }
  .corner-brackets::after { top: 0; right: 0; border-top-width: 2px; border-right-width: 2px; }
  .corner-brackets .inner::before { bottom: 0; left: 0; border-bottom-width: 2px; border-left-width: 2px; }
  .corner-brackets .inner::after { bottom: 0; right: 0; border-bottom-width: 2px; border-right-width: 2px; }

  /* ── Info Panel ── */
  .info-panel {
    flex-shrink: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    z-index: 20;
    min-height: 120px;
    max-height: 200px;
    overflow-y: auto;
  }

  .no-detection {
    text-align: center;
    padding: 16px;
    color: var(--text-dim);
    font-size: 14px;
  }
  .no-detection .icon {
    font-size: 28px;
    margin-bottom: 6px;
    opacity: 0.5;
  }

  .detection-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .det-card {
    background: #111820;
    border: 1px solid var(--border);
    border-left: 3px solid var(--neon);
    border-radius: 6px;
    padding: 10px 12px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    animation: slideUp 0.25s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .det-card .obj-name {
    grid-column: 1 / -1;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--neon);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .det-card .obj-name .conf {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .metric {
    display: flex;
    flex-direction: column;
  }
  .metric .label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .metric .value {
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
  }
  .metric .unit {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: var(--cyan);
    font-weight: 400;
  }

  /* ── Calibration Bar ── */
  .calibration-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: #0b0f15;
    border-top: 1px solid var(--border);
    z-index: 20;
    flex-shrink: 0;
  }
  .calibration-bar label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .calibration-bar input[type=range] {
    flex: 1;
    accent-color: var(--neon);
    height: 4px;
  }
  .calibration-bar .dist-val {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    color: var(--cyan);
    min-width: 52px;
    text-align: right;
  }

  /* ── Loading Overlay ── */
  .loading-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }
  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loading-spinner {
    width: 60px; height: 60px;
    border: 3px solid var(--border);
    border-top-color: var(--neon);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    color: var(--neon);
    letter-spacing: 2px;
    text-align: center;
  }
  .loading-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: center;
    max-width: 280px;
    line-height: 1.5;
  }

  /* ── Error ── */
  .error-msg {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--panel);
    border: 1px solid var(--red);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    z-index: 200;
    max-width: 320px;
  }
  .error-msg h2 { color: var(--red); font-size: 16px; margin-bottom: 8px; }
  .error-msg p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
</style>
</head>

<div class="loading-overlay" id="loadingOverlay">

// Korean name mapping
const KO_NAMES = {
  person: '사람', bicycle: '자전거', car: '자동차', motorcycle: '오토바이',
  airplane: '비행기', bus: '버스', train: '기차', truck: '트럭', boat: '보트',

  knife: '칼', spoon: '숟가락', bowl: '그릇', banana: '바나나',
  apple: '사과', sandwich: '샌드위치', orange: '오렌지', broccoli: '브로콜리',
  carrot: '당근', 'hot dog': '핫도그', pizza: '피자', donut: '도넛',
  cake: '케이크', chair: '의자', couch: '소파', 'potted plant': '화분',
  bed: '침대', 'dining table': '식탁', toilet: '변기', tv: 'TV',
  laptop: '노트북', mouse: '마우스', remote: '리모컨', keyboard: '키보드',

  toaster: '토스터', sink: '싱크대', refrigerator: '냉장고',
  book: '책', clock: '시계', vase: '꽃병', scissors: '가위',

// ── App State ──
let model = null;
let video, canvas, ctx;
let distanceCm = 60;
let animId;
let lastDetections = [];

// ── Init ──
async function init() {
  video = document.getElementById('video');
  canvas = document.getElementById('overlay');
  ctx = canvas.getContext('2d');

  const distSlider = document.getElementById('distSlider');
  distSlider.addEventListener('input', e => {
    distanceCm = parseInt(e.target.value);
    document.getElementById('distVal').textContent = distanceCm + ' cm';
  });

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
  } catch (err) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.body.innerHTML += `
      <div class="error-msg">
        <h2>카메라 접근 불가</h2>
        <p>카메라 권한을 허용해주세요.<br>HTTPS 환경에서 실행해야 합니다.</p>
      </div>`;
    return;
  }

  document.getElementById('loadingMsg').textContent = 'COCO-SSD 모델 로딩 중...';

  try {
    model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
  } catch (e) {
    model = await cocoSsd.load();
  }

  document.getElementById('loadingOverlay').classList.add('hidden');
  const badge = document.getElementById('statusBadge');
  badge.textContent = 'ACTIVE';
  badge.className = 'status-badge ready';

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  detect();
}

function resizeCanvas() {
  canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
  canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
}

// ── Dimension estimation ──
// We use a pinhole camera model approximation:
// real_size = (pixel_size / image_pixel) * distance * sensor_factor
function estimateDimensions(bbox, cls) {
  const [bx, by, bw, bh] = bbox;
  const vw = video.videoWidth || 640;
  const vh = video.videoHeight || 480;

  // Known object data
  const known = OBJECT_DB[cls];

  if (known) {
    // Use known real-world sizes, scale by aspect ratio difference
    const detectedAR = bw / bh;
    const knownAR = known.w / known.h;

    // Proportional scaling based on bounding box coverage
    const coverageW = bw / vw;
    const coverageH = bh / vh;

    // Estimate with distance factor
    const distFactor = distanceCm / 50;
    const widthMm = known.w * coverageW * distFactor * 1.8;
    const heightMm = known.h * coverageH * distFactor * 1.8;
    const depthMm = known.d * ((coverageW + coverageH) / 2) * distFactor * 1.8;

    // Weight scales with volume ratio
    const volRatio = (widthMm / known.w) * (heightMm / known.h) * (depthMm / known.d);
    const weightKg = known.kg * Math.min(volRatio, 3);

    return {
      w: Math.round(widthMm),
      h: Math.round(heightMm),
      d: Math.round(depthMm),
      kg: weightKg.toFixed(2)
    };
  }

  // Fallback: generic estimation
  const pixPerMm = vw / (distanceCm * 10 * 0.8);
  const wMm = Math.round(bw / pixPerMm);
  const hMm = Math.round(bh / pixPerMm);
  const dMm = Math.round(Math.min(wMm, hMm) * 0.4);
  const volume = (wMm * hMm * dMm) / 1e9; // m³
  const kgEst = (volume * 500).toFixed(2); // avg density ~500 kg/m³

  return { w: wMm, h: hMm, d: dMm, kg: kgEst };
}

// ── Detection Loop ──
async function detect() {
  if (!model) return;

  const predictions = await model.detect(video, 10, 0.35);

  // Clear canvas
  const scale = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cw = canvas.width;
  const ch = canvas.height;
  const vw = video.videoWidth || 640;
  const vh = video.videoHeight || 480;

  // Compute cover-fit scaling
  const videoAR = vw / vh;
  const canvasAR = cw / ch;
  let sx, sy, sw, sh;
  if (videoAR > canvasAR) {
    sh = ch; sw = ch * videoAR;
    sx = (cw - sw) / 2; sy = 0;
  } else {
    sw = cw; sh = cw / videoAR;
    sx = 0; sy = (ch - sh) / 2;
  }

  const detections = [];

  predictions.forEach((pred, idx) => {
    const [bx, by, bw, bh] = pred.bbox;

    // Map video coords to canvas coords
    const x = sx + (bx / vw) * sw;
    const y = sy + (by / vh) * sh;
    const w = (bw / vw) * sw;
    const h = (bh / vh) * sh;

    const dims = estimateDimensions(pred.bbox, pred.class);
    const koName = KO_NAMES[pred.class] || pred.class;
    const conf = Math.round(pred.score * 100);

    detections.push({ name: koName, enName: pred.class, conf, dims });

    // Draw bounding box
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 2 * scale;
    ctx.setLineDash([]);
    ctx.strokeRect(x, y, w, h);

    // Corner accents
    const cornerLen = Math.min(w, h) * 0.15;
    ctx.lineWidth = 3 * scale;
    ctx.strokeStyle = '#00ff88';
    // TL
    ctx.beginPath(); ctx.moveTo(x, y + cornerLen); ctx.lineTo(x, y); ctx.lineTo(x + cornerLen, y); ctx.stroke();
    // TR
    ctx.beginPath(); ctx.moveTo(x + w - cornerLen, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + cornerLen); ctx.stroke();
    // BL
    ctx.beginPath(); ctx.moveTo(x, y + h - cornerLen); ctx.lineTo(x, y + h); ctx.lineTo(x + cornerLen, y + h); ctx.stroke();
    // BR
    ctx.beginPath(); ctx.moveTo(x + w - cornerLen, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - cornerLen); ctx.stroke();

    // Dimension lines
    ctx.setLineDash([4 * scale, 4 * scale]);
    ctx.lineWidth = 1 * scale;
    ctx.strokeStyle = '#00d4ff88';

    // Width line (top)
    const topY = y - 10 * scale;
    ctx.beginPath(); ctx.moveTo(x, topY); ctx.lineTo(x + w, topY); ctx.stroke();
    // Height line (right)
    const rightX = x + w + 10 * scale;
    ctx.beginPath(); ctx.moveTo(rightX, y); ctx.lineTo(rightX, y + h); ctx.stroke();
    ctx.setLineDash([]);

    // Labels
    ctx.font = `bold ${11 * scale}px Orbitron, monospace`;

    // Width label
    const wLabel = dims.w + ' mm';
    const wLabelW = ctx.measureText(wLabel).width;
    ctx.fillStyle = '#0a0e14cc';
    ctx.fillRect(x + w / 2 - wLabelW / 2 - 4 * scale, topY - 14 * scale, wLabelW + 8 * scale, 16 * scale);
    ctx.fillStyle = '#00d4ff';
    ctx.textAlign = 'center';
    ctx.fillText(wLabel, x + w / 2, topY - 2 * scale);

    // Height label
    ctx.save();
    ctx.translate(rightX + 14 * scale, y + h / 2);
    ctx.rotate(Math.PI / 2);
    const hLabel = dims.h + ' mm';
    const hLabelW = ctx.measureText(hLabel).width;
    ctx.fillStyle = '#0a0e14cc';
    ctx.fillRect(-hLabelW / 2 - 4 * scale, -14 * scale, hLabelW + 8 * scale, 16 * scale);
    ctx.fillStyle = '#00d4ff';
    ctx.textAlign = 'center';
    ctx.fillText(hLabel, 0, -2 * scale);
    ctx.restore();

    // Name + weight badge (bottom)
    ctx.font = `bold ${12 * scale}px Rajdhani, sans-serif`;
    const badge = `${koName}  ·  ${dims.kg} kg`;
    const badgeW = ctx.measureText(badge).width;
    const badgeX = x;
    const badgeY = y + h + 4 * scale;
    ctx.fillStyle = '#00ff8822';
    ctx.fillRect(badgeX, badgeY, badgeW + 12 * scale, 20 * scale);
    ctx.fillStyle = '#00ff88';
    ctx.textAlign = 'left';
    ctx.fillText(badge, badgeX + 6 * scale, badgeY + 14 * scale);
  });

  lastDetections = detections;
  updatePanel(detections);

  animId = requestAnimationFrame(detect);
}

// ── Update Info Panel ──
function updatePanel(dets) {
  const panel = document.getElementById('infoPanel');
  if (!dets.length) {
    panel.innerHTML = `
      <div class="no-detection">
        <div class="icon">📷</div>
        카메라로 물체를 비춰주세요
      </div>`;
    return;
  }

  panel.innerHTML = '<div class="detection-cards">' +
    dets.map(d => `
      <div class="det-card">
        <div class="obj-name">
          ◈ ${d.name}
          <span class="conf">${d.conf}%</span>
        </div>
        <div class="metric">
          <span class="label">가로(W)</span>
          <span class="value">${d.dims.w} <span class="unit">mm</span></span>
        </div>
        <div class="metric">
          <span class="label">세로(H)</span>
          <span class="value">${d.dims.h} <span class="unit">mm</span></span>
        </div>
        <div class="metric">
          <span class="label">중량</span>
          <span class="value">${d.dims.kg} <span class="unit">kg</span></span>
        </div>
      </div>
    `).join('') +
    '</div>';
}

// ── Start ──
init();
</script>
</body>
</html>
